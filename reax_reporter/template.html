<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReaxTools-Pro 持久化分析报告</title>
    <link rel="stylesheet" href="./web_version_reference/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://unpkg.com/graphlib-dot@0.6.2/dist/graphlib-dot.min.js"></script>
    <script src="https://unpkg.com/graphology@0.25.1/dist/graphology.umd.min.js"></script>
    <script src="https://unpkg.com/sigma@2.4.0/build/sigma.min.js"></script>
</head>

<body>
    <h2>ReaxTools-Pro 持久化分析报告</h2>

    <!-- 介绍信息 -->
    <div class="container">
        <p>ReaxTools是一款高性能的反应动力学后处理软件，针对ReaxFF/AIMD/NEP/MLP等各类反应动力学结果，能够计算分子物种、键、原子类型、环的数量随时间变化曲线，并绘制反应网络图，以及进行分子转移和流分析。
        </p>
        <p>尊敬的企业版用户，为便于您的快速查看和分享，此报告已离线持久化所有结果数据和组件，无需联网加载，并且您的数据不会上传至任何服务器。</p>
        <p>您的项目ID: DATA_PROJECT_ID
        </p>
    </div>

    <div id="data-info">
        <div id="data-status">正在解析嵌入数据，请稍等...</div>
    </div>

    <div id="charts-container">
        <h3>数据可视化</h3>
        <div class="chart-controls">
            <button id="exportAllChartsBtn">导出所有线性图表</button>
            <button id="clearAllBtn">清除所有图表</button>
        </div>
        <div id="charts-area"></div>
    </div>

    <!-- 数据嵌入位置 - 将由reax_reporter.py填充 -->
    <script id="embedded-data" type="application/json">
        <!-- DATA_PLACEHOLDER -->
    </script>

    <!-- 加载现有的JavaScript文件 -->
    <script src="./web_version_reference/plot_network.js"></script>
    <script src="./web_version_reference/plot.js"></script>

    <script>
        // 数据存储
        let loadedData = new Map();
        let plotter = null;

        // 等待所有脚本加载完成后再初始化
        function waitForScripts() {
            if (typeof ReaxToolsPlotter !== 'undefined') {
                console.log('ReaxToolsPlotter loaded, initializing...');
                initializeApp();
            } else {
                console.log('Waiting for ReaxToolsPlotter to load...');
                setTimeout(waitForScripts, 100);
            }
        }

        // 初始化应用
        function initializeApp() {
            try {
                // 初始化plotter
                plotter = new ReaxToolsPlotter();
                if (plotter.init('charts-area')) {
                    console.log('Plotter initialized successfully');

                    // 绑定事件
                    document.getElementById('exportAllChartsBtn').addEventListener('click', exportAllCharts);
                    document.getElementById('clearAllBtn').addEventListener('click', clearAllCharts);

                    // 自动加载嵌入的数据
                    loadEmbeddedData();
                } else {
                    console.error('Failed to initialize plotter');
                }
            } catch (error) {
                console.error('Error initializing app:', error);
            }
        }

        // 页面加载完成后开始等待脚本
        document.addEventListener('DOMContentLoaded', function () {
            console.log('DOM loaded, waiting for scripts...');
            waitForScripts();
        });

        // 加载嵌入的数据
        function loadEmbeddedData() {
            const statusDiv = document.getElementById('data-status');

            try {
                // 从嵌入的script标签中获取数据
                const dataScript = document.getElementById('embedded-data');
                if (!dataScript || !dataScript.textContent || dataScript.textContent.trim() === '') {
                    statusDiv.innerHTML = 'No embedded data found';
                    return;
                }

                // 解析JSON数据
                const embeddedData = JSON.parse(dataScript.textContent);

                if (!embeddedData || Object.keys(embeddedData).length === 0) {
                    statusDiv.innerHTML = 'No valid data found';
                    return;
                }

                // 存储加载的数据
                Object.entries(embeddedData).forEach(([filename, content]) => {
                    loadedData.set(filename, content);
                });

                statusDiv.innerHTML = `Loaded ${loadedData.size} data files successfully`;
                console.log('Loaded embedded data files:', Array.from(loadedData.keys()));

                // 创建可视化图表 - 使用正确的方法
                createVisualizations(Array.from(loadedData.entries()).map(([name, content]) => ({ name, content })));

            } catch (error) {
                statusDiv.innerHTML = `Error loading embedded data: ${error.message}`;
                console.error('Error loading embedded data:', error);
            }
        }

        // 创建可视化图表
        function createVisualizations(dataFiles) {
            if (!plotter) {
                console.error('Plotter not initialized');
                return;
            }

            // 清除现有图表
            plotter.clearCharts();

            // 使用createMultipleCharts方法，它会自动创建所有必要的容器
            try {
                plotter.createMultipleCharts(dataFiles, 'charts-area');
                console.log('✓ All charts created successfully using createMultipleCharts');
            } catch (error) {
                console.error('Error creating charts with createMultipleCharts:', error);

                // 如果createMultipleCharts失败，尝试逐个创建
                console.log('Falling back to individual chart creation...');
                dataFiles.forEach(file => {
                    try {
                        if (file.name.endsWith('.csv')) {
                            createCSVChart(file);
                        } else if (file.name.endsWith('.dot')) {
                            createNetworkChart(file);
                        }
                    } catch (error) {
                        console.error(`Error creating chart for ${file.name}:`, error);
                    }
                });
            }
        }

        // 创建CSV数据图表 - 备用方法
        function createCSVChart(file) {
            try {
                // 创建容器元素
                const containerId = `chart_${file.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
                const container = document.createElement('div');
                container.id = containerId;
                container.className = 'chart-container';
                document.getElementById('charts-area').appendChild(container);

                // 使用autoCreateChart方法
                plotter.autoCreateChart(file.content, containerId, file.name);
                console.log(`✓ Created chart for ${file.name}`);
            } catch (error) {
                console.error(`Error creating CSV chart for ${file.name}:`, error);
            }
        }

        // 创建网络图表 - 备用方法
        function createNetworkChart(file) {
            try {
                if (file.name === 'reactions.dot') {
                    // 创建网络图容器
                    const containerId = `chart_${file.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
                    const container = document.createElement('div');
                    container.id = containerId;
                    container.className = 'chart-container network-container';
                    document.getElementById('charts-area').appendChild(container);

                    // 使用plot_network.js中的功能创建网络图
                    if (window.createReactionNetwork) {
                        window.createReactionNetwork(file.content, containerId);
                    } else {
                        console.log('Network visualization function not available');
                    }
                }
            } catch (error) {
                console.error(`Error creating network chart for ${file.name}:`, error);
            }
        }

        // 导出所有图表
        function exportAllCharts() {
            if (plotter && plotter.charts) {
                plotter.charts.forEach((_, chartId) => {
                    plotter.exportChart(chartId, `${chartId}.png`);
                });
            }
        }

        // 清除所有图表
        function clearAllCharts() {
            if (plotter) {
                plotter.clearCharts();
            }
            loadedData.clear();
            document.getElementById('data-status').innerHTML = 'No data loaded yet';

            // 清除charts-area中的内容
            const chartsArea = document.getElementById('charts-area');
            if (chartsArea) {
                chartsArea.innerHTML = '';
            }
        }
    </script>

    <div class="container">
        <p><b>对应主程序版本</b>: 1.95-Pro</p>
    </div>
</body>

</html>
